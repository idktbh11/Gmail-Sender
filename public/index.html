<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gmail Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #1a1a1a;
    }

    p {
      color: #666;
      margin-bottom: 24px;
      font-size: 14px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input {
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #4285f4;
    }

    button {
      padding: 12px;
      background: #4285f4;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #3367d6; }
    button:disabled { background: #93b8f7; cursor: not-allowed; }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }

    .message.success { display: block; background: #e6f4ea; color: #1e7e34; }
    .message.error { display: block; background: #fce8e6; color: #c62828; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gmail Agent</h1>
    <p>Enter an email address to send a hello message</p>
    <form id="emailForm">
      <input type="email" id="email" placeholder="recipient@example.com" required />
      <button type="submit">Send Hello</button>
    </form>
    <div id="message" class="message"></div>
  </div>

  <script>
    const form = document.getElementById("emailForm");
    const msg = document.getElementById("message");
    const btn = form.querySelector("button");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;

      btn.disabled = true;
      btn.textContent = "Sending...";
      msg.className = "message";

      try {
        const res = await fetch("/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email }),
        });

        const data = await res.json();

        if (res.ok) {
          msg.textContent = data.message;
          msg.className = "message success";
          form.reset();
        } else {
          msg.textContent = data.error;
          msg.className = "message error";
        }
      } catch {
        msg.textContent = "Something went wrong. Try again.";
        msg.className = "message error";
      }

      btn.disabled = false;
      btn.textContent = "Send Hello";
    });
  </script>
</body>
</html>
